apiVersion: v1
kind: Namespace
metadata:
  name: airflow-enterprise

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-config
  namespace: airflow-enterprise
data:
  AIRFLOW_HOME: /home/airflow
  AIRFLOW__CORE__DAGS_FOLDER: /home/airflow/dags
  AIRFLOW__CORE__BASE_LOG_FOLDER: /home/airflow/logs
  AIRFLOW__CORE__PLUGINS_FOLDER: /home/airflow/plugins
  AIRFLOW__CORE__LOAD_EXAMPLES: "False"
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql://airflow:password@airflow-postgres.airflow-enterprise.svc.cluster.local:5432/airflow
  AIRFLOW__CORE__EXECUTOR: KubernetesExecutor
  AIRFLOW__LOGGING__REMOTE_LOGGING: "False"

---
apiVersion: v1
kind: Secret
metadata:
  name: airflow-secrets
  namespace: airflow-enterprise
type: Opaque
stringData:
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql://airflow:airflow123@airflow-postgres:5432/airflow"
  FERNET_KEY: "your-fernet-key-here"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: airflow-enterprise
spec:
  replicas: 2
  selector:
    matchLabels:
      app: airflow-webserver
  template:
    metadata:
      labels:
        app: airflow-webserver
    spec:
      containers:
      - name: webserver
        image: apache/airflow:2.7.0
        command: ["airflow", "webserver"]
        ports:
        - containerPort: 8080
        env:
        - name: AIRFLOW__CORE__LOAD_EXAMPLES
          value: "False"
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          valueFrom:
            secretKeyRef:
              name: airflow-secrets
              key: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        volumeMounts:
        - name: dags
          mountPath: /home/airflow/dags
        - name: plugins
          mountPath: /home/airflow/plugins
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 60
      volumes:
      - name: dags
        configMap:
          name: airflow-dags
      - name: plugins
        configMap:
          name: airflow-plugins

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
  namespace: airflow-enterprise
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-scheduler
  template:
    metadata:
      labels:
        app: airflow-scheduler
    spec:
      containers:
      - name: scheduler
        image: apache/airflow:2.7.0
        command: ["airflow", "scheduler"]
        env:
        - name: AIRFLOW__CORE__LOAD_EXAMPLES
          value: "False"
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          valueFrom:
            secretKeyRef:
              name: airflow-secrets
              key: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        volumeMounts:
        - name: dags
          mountPath: /home/airflow/dags
        - name: plugins
          mountPath: /home/airflow/plugins
      volumes:
      - name: dags
        configMap:
          name: airflow-dags
      - name: plugins
        configMap:
          name: airflow-plugins

---
apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  namespace: airflow-enterprise
spec:
  type: LoadBalancer
  selector:
    app: airflow-webserver
  ports:
  - port: 80
    targetPort: 8080

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: airflow-metrics
  namespace: airflow-enterprise
spec:
  selector:
    matchLabels:
      app: airflow-webserver
  endpoints:
  - port: metrics
    interval: 30s
