apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-config
  namespace: airflow-enterprise
data:
  AIRFLOW_HOME: /home/airflow
  AIRFLOW__CORE__DAGS_FOLDER: /home/airflow/dags
  AIRFLOW__CORE__BASE_LOG_FOLDER: /home/airflow/logs
  AIRFLOW__CORE__PLUGINS_FOLDER: /home/airflow/plugins
  AIRFLOW__CORE__LOAD_EXAMPLES: "False"
  AIRFLOW__CORE__EXECUTOR: KubernetesExecutor
  AIRFLOW__LOGGING__REMOTE_LOGGING: "False"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: airflow-enterprise
spec:
  replicas: 2
  selector:
    matchLabels:
      app: airflow-webserver
  template:
    metadata:
      labels:
        app: airflow-webserver
    spec:
      initContainers:
      - name: init-db
        image: ghcr.io/niteshme21/airflow-enterprise:main
        command:
        - bash
        - -c
        - |
          airflow db init
          airflow users create \
            --username admin \
            --password admin123 \
            --firstname Admin \
            --lastname User \
            --role Admin \
            --email admin@airflow.com || true
        envFrom:
        - configMapRef:
            name: airflow-config
        env:
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          valueFrom:
            secretKeyRef:
              name: airflow-secrets
              key: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
        - name: AIRFLOW__CORE__FERNET_KEY
          valueFrom:
            secretKeyRef:
              name: airflow-secrets
              key: FERNET_KEY
      containers:
      - name: webserver
        image: ghcr.io/niteshme21/airflow-enterprise:main
        command: ["airflow", "webserver"]
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: airflow-config
        env:
        - name: AIRFLOW__CORE__LOAD_EXAMPLES
          value: "False"
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          valueFrom:
            secretKeyRef:
              name: airflow-secrets
              key: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
        - name: AIRFLOW__CORE__FERNET_KEY
          valueFrom:
            secretKeyRef:
              name: airflow-secrets
              key: FERNET_KEY
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 60

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
  namespace: airflow-enterprise
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-scheduler
  template:
    metadata:
      labels:
        app: airflow-scheduler
    spec:
      containers:
      - name: scheduler
        image: ghcr.io/niteshme21/airflow-enterprise:main
        command: ["airflow", "scheduler"]
        envFrom:
        - configMapRef:
            name: airflow-config
        env:
        - name: AIRFLOW__CORE__LOAD_EXAMPLES
          value: "False"
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          valueFrom:
            secretKeyRef:
              name: airflow-secrets
              key: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
        - name: AIRFLOW__CORE__FERNET_KEY
          valueFrom:
            secretKeyRef:
              name: airflow-secrets
              key: FERNET_KEY
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1000m"
            memory: "2Gi"

---
apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  namespace: airflow-enterprise
spec:
  type: LoadBalancer
  selector:
    app: airflow-webserver
  ports:
  - port: 80
    targetPort: 8080
